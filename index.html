<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司行動打卡系統</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f7f6; }
        .btn { display: inline-block; width: 80%; max-width: 300px; padding: 15px; margin: 15px 0; font-size: 18px; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn-in { background-color: #2ecc71; }
        .btn-out { background-color: #e74c3c; }
        #message { margin-top: 20px; font-size: 16px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h2>歡迎使用公司打卡系統</h2>
    <p id="user-display">正在載入員工資訊...</p>
    
    <button class="btn btn-in" onclick="processClockIn('上班')">上班打卡</button>
    <button class="btn btn-out" onclick="processClockIn('下班')">下班打卡</button>
    
    <div id="message"></div>

    <script>
        var userLineId = "";
        var userLineName = "";
        var userCurrentIp = "";
        
        // 你的 Google 資料庫後端網址 (不變)
        var GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxWWjONT1jtIHggU5N3fmK6rwSXLFBiFBwTIiGeZNYlzN-Qs0SnP2BGsWfUVxX89Bpesg/exec"; 

        async function initLiff() {
            try {
                await liff.init({ liffId: "2010274675-q3hhlrwa" }); 
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    userLineId = profile.userId;
                    userLineName = profile.displayName;
                    document.getElementById("user-display").innerText = "你好，" + userLineName;
                } else {
                    liff.login();
                }
            } catch (error) {
                document.getElementById("user-display").innerText = "LINE 身分驗證失敗，請重新開啟網頁。";
            }
        }

        async function getPublicIp() {
            try {
                let response = await fetch('https://ipinfo.io/json');
                let data = await response.json();
                userCurrentIp = data.ip;
            } catch (error) {
                try {
                    let response = await fetch('https://api.ipify.org?format=json');
                    let data = await response.json();
                    userCurrentIp = data.ip;
                } catch (e) {
                    console.error("IP抓取失敗");
                }
            }
        }

        async function processClockIn(type) {
            if (!userLineId || !userCurrentIp) {
                alert("資料載入中，請稍候再試\n（請確認是否已看到您的 LINE 名字與網路連線）");
                return;
            }
            
            document.getElementById("message").innerText = "打卡資料傳送中...";
            
            try {
                let response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        userId: userLineId,
                        userName: userLineName,
                        type: type,
                        ip: userCurrentIp
                    })
                });
                let result = await response.json();
                
                if (result.status === "打卡成功") {
                    document.getElementById("message").innerHTML = `<span style="color:green;">響應：${result.status}<br>時間：${result.time}</span>`;
                    setTimeout(() => { liff.closeWindow(); }, 2000); 
                } else {
                    document.getElementById("message").innerHTML = `<span style="color:red;">錯誤：${result.status}</span>`;
                }
            } catch (error) {
                document.getElementById("message").innerText = "打卡連線失敗，請聯繫系統管理員。";
            }
        }

        window.onload = async function() {
            await initLiff();
            await getPublicIp();
        }
    </script>
</body>
</html>
